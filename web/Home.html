<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLUX - Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
    <div class="nav-left">
        <div class="nav-logo">BLUX</div>
        <ul class="nav-links">
            <li><a href="home.html" class="active">Home</a></li>
            <li><a href="movies.html">Movies</a></li>
            <li><a href="live.html" class="live-link">Live</a></li>
            <li><a href="mylist.html" onclick="irAMyList()">MyList</a></li>
        </ul>
    </div>
    <div class="nav-right">
        <div class="search-box" id="searchBox">
            <svg onclick="toggleSearch()" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke-width="2"/><path d="m21 21-4.35-4.35" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="buscarContenido(event)">
        </div>
        <div class="nav-profile" onclick="toggleProfileMenu()">
            <img id="navAvatar" src="" alt="perfil" class="nav-avatar">
            <span id="navName"></span>
            <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
            <div class="profile-dropdown" id="profileDropdown">
                <div onclick="window.location.href='index.html'">Cambiar perfil</div>
                <div onclick="cerrarSesion()">Cerrar sesión</div>
            </div>
        </div>
    </div>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content" id="heroContent">
        <div class="hero-badge" id="heroBadge">🔥 #1 en películas hoy</div>
        <h1 class="hero-title" id="heroTitle">Cargando...</h1>
        <p class="hero-desc" id="heroDesc"></p>
        <div class="hero-meta" id="heroMeta"></div>
        <div class="hero-actions">
            <button class="btn-play" id="heroPlayBtn">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                Play
            </button>
            <button class="btn-info" id="heroInfoBtn">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><path d="M12 16v-4M12 8h.01" stroke-width="2" stroke-linecap="round"/></svg>
                Más info
            </button>
        </div>
    </div>
    <div class="hero-progress"><div class="hero-progress-bar" id="heroProgressBar"></div></div>
</section>

<!-- BÚSQUEDA -->
<section class="search-results" id="searchResults" style="display:none;">
    <div class="section-header"><h2>Resultados</h2></div>
    <div class="cards-grid" id="searchGrid"></div>
</section>

<!-- CONTENIDO PRINCIPAL -->
<main class="main-content" id="mainContent">
    <!-- Secciones de películas/series -->
    <div id="seccionesContainer"></div>

    <!-- En Vivo separado con color morado -->
    <section class="content-section live-section" id="liveSection" style="display:none;">
        <div class="section-header">
            <h2><span class="live-dot"></span> En Vivo ahora</h2>
            <a href="live.html" class="see-all-live">Ver todo en Live →</a>
        </div>
        <div class="cards-row" id="liveGrid"></div>
    </section>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModal()"></div>
<div class="content-modal" id="contentModal">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-hero">
        <img id="modalImg" src="" alt="">
        <div class="modal-hero-overlay"></div>
        <div class="modal-hero-info">
            <h2 id="modalTitle"></h2>
            <div class="modal-badges" id="modalBadges"></div>
            <div class="modal-actions">
                <button class="btn-play" id="modalPlayBtn">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    Reproducir
                </button>
                <button class="btn-fav" id="modalFavBtn" onclick="toggleFavorito()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 21l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.18L12 21z" stroke-width="2"/></svg>
                    Mi Lista
                </button>
            </div>
        </div>
    </div>
    <div class="modal-body">
        <div class="modal-detail" id="modalDetail"></div>
    </div>
</div>

<script src="home.js"></script>
</body>
</html>
